[build]
  # Build the client
  command = "cd client && npm install && npm run build"
  # Path to the build output
  publish = "client/dist"

[functions]
  # Path to the functions directory
  directory = "server/src/functions"
  # Modules to be excluded from bundling (optional, helps with binary/large modules)
  external_node_modules = ["mysql2", "bcryptjs", "jsonwebtoken", "multer"]

[[redirects]]
  # Redirect all /api requests to the Netlify function
  from = "/api/*"
  to = "/.netlify/functions/api"
  status = 200

[[redirects]]
  # Support for React Router
  from = "/*"
  to = "/index.html"
  status = 200
